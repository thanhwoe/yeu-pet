name: API CI

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/api-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/api-ci.yml"

jobs:
  ci:
    name: Verify, build, and package API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check API lint
        run: pnpm --filter @yeu-pet/api lint:check

      - name: Check API types
        run: pnpm --filter @yeu-pet/api exec tsc --noEmit -p tsconfig.json

      - name: Test API units
        run: pnpm --filter @yeu-pet/api test

      - name: Test API E2E
        run: pnpm --filter @yeu-pet/api test:e2e

      - name: Build API
        run: pnpm --filter @yeu-pet/api build

      - name: Build API Docker image
        run: docker build -f apps/api/Dockerfile -t yeu-pet-api:ci .
