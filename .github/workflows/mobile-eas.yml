name: Mobile EAS Deploy

on:
  push:
    branches:
      - main
    paths:
      - "apps/mobile/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/mobile-eas.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "EAS action to run"
        required: true
        type: choice
        default: update-preview
        options:
          - update-preview
          - update-production
          - build-preview
          - build-production
          - submit-production
      platform:
        description: "Target platform"
        required: true
        type: choice
        default: all
        options:
          - all
          - android
          - ios

concurrency:
  group: mobile-eas-${{ github.ref }}
  cancel-in-progress: false

jobs:
  eas:
    name: Run EAS command
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Check EXPO_TOKEN
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "Missing EXPO_TOKEN. Add it in GitHub repository secrets before running EAS deploys."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Expo lint
        run: pnpm --filter @yeu-pet/mobile lint

      - name: Publish production update on main
        if: github.event_name == 'push'
        working-directory: apps/mobile
        run: |
          eas update \
            --channel production \
            --environment production \
            --message "GitHub Actions production update ${GITHUB_SHA}" \
            --non-interactive

      - name: Run manual EAS action
        if: github.event_name == 'workflow_dispatch'
        working-directory: apps/mobile
        env:
          EAS_ACTION: ${{ github.event.inputs.action }}
          EAS_PLATFORM: ${{ github.event.inputs.platform }}
        run: |
          case "$EAS_ACTION" in
            update-preview)
              eas update \
                --channel preview \
                --environment preview \
                --message "GitHub Actions preview update ${GITHUB_SHA}" \
                --non-interactive
              ;;
            update-production)
              eas update \
                --channel production \
                --environment production \
                --message "GitHub Actions production update ${GITHUB_SHA}" \
                --non-interactive
              ;;
            build-preview)
              eas build \
                --platform "$EAS_PLATFORM" \
                --profile preview \
                --non-interactive \
                --no-wait
              ;;
            build-production)
              eas build \
                --platform "$EAS_PLATFORM" \
                --profile production \
                --non-interactive \
                --no-wait
              ;;
            submit-production)
              eas submit \
                --platform "$EAS_PLATFORM" \
                --profile production \
                --latest \
                --non-interactive
              ;;
            *)
              echo "Unknown action: $EAS_ACTION"
              exit 1
              ;;
          esac
